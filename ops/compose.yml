services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        GITHUB_SHA: ${GITHUB_SHA:-dev}
    init: true
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - NEKOPATH_DB=/app/server/data/nekopath.db
      # Teacher AI providers. ChatGPT runs through the official Codex App
      # Server with per-teacher OAuth (device flow started from the Neko dock);
      # credentials live on the persistent volume, never in this file.
      # Enabled by captain's decision 19/07 for the pilot deployment.
      - NEKOPATH_CODEX_APP_SERVER_ENABLED=${NEKOPATH_CODEX_APP_SERVER_ENABLED:-1}
      - NEKOPATH_CODEX_DATA=/app/server/data/codex-accounts
      - NEKOPATH_CODEX_MODEL=${NEKOPATH_CODEX_MODEL:-gpt-5.5}
      # Optional metered fallback for /api/ai/responses and /api/ai/variants;
      # set on the VM only, never committed.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NEKOPATH_OPENAI_MODEL=${NEKOPATH_OPENAI_MODEL:-gpt-5.5}
    volumes:
      - nekopath-data:/app/server/data
    expose:
      - '3001'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3001/api/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    cpus: '1.5'
    mem_limit: 1536m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://127.0.0.1:2019/config/ >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    cpus: '0.25'
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  nekopath-data:
  caddy-data:
  caddy-config:
